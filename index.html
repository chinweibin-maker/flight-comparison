<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>FlightGlobal Pro | 全球航班比价中心</title>
    
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-theme="light">

    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        <p>正在同步全球 GDS 数据...</p>
    </div>

    <nav>
        <div class="nav-container">
            <div class="logo"><i class="fas fa-globe-americas"></i> FlightGlobal <span>Pro</span></div>
            <div class="nav-tools">
                <select id="currency-select">
                    <option value="MYR">MYR (RM)</option>
                    <option value="USD">USD ($)</option>
                    <option value="CNY">CNY (¥)</option>
                </select>
                <button id="theme-toggle" class="icon-btn"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </nav>

    <div class="main-layout">
        <aside class="sidebar">
            <section class="search-card">
                <h3><i class="fas fa-search"></i> 航线搜索</h3>
                <div class="input-group">
                    <label>出发地 (IATA)</label>
                    <input type="text" id="origin" placeholder="例如: KUL" maxlength="3">
                </div>
                <div class="input-group">
                    <label>目的地 (IATA)</label>
                    <input type="text" id="destination" placeholder="例如: NRT" maxlength="3">
                </div>
                <div class="input-group">
                    <label>出发日期</label>
                    <input type="date" id="dep-date">
                </div>
                <button id="search-btn" class="primary-btn">立即搜索</button>
            </section>

            <section class="filter-card">
                <h3><i class="fas fa-sort-amount-down"></i> 智能排序</h3>
                <select id="sort-select">
                    <option value="price_asc">价格：从低到高</option>
                    <option value="duration_asc">时长：从短到长</option>
                </select>
            </section>
        </aside>

        <main class="content">
            <div class="chart-container card">
                <h3><i class="fas fa-chart-bar"></i> 实时价格波动分析</h3>
                <div class="canvas-wrapper">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>

            <div id="flight-results" class="results-grid">
                <div class="empty-state">
                    <i class="fas fa-plane-departure"></i>
                    <p>请输入行程信息并点击搜索</p>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
